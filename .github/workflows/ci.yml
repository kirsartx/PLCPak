name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: winui

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: winui/global.json

      - name: Restore
        run: dotnet restore PLCPak.sln

      - name: Build & Test
        run: |
          dotnet build src/PLCPak.Core.Tests/PLCPak.Core.Tests.csproj -c Release
          dotnet test src/PLCPak.Core.Tests/PLCPak.Core.Tests.csproj -c Release --no-build
          dotnet build src/PLCPak.WinUI/PLCPak.WinUI.csproj -c Release -p:Platform=x64